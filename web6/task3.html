<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humair Naseer - Profile</title>

<style>
:root{
    --bg:#f8f9fa;
    --text:#222;
    --nav:#ffffff;
}

body.dark{
    --bg:#222;
    --text:#f8f9fa;
    --nav:#333;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

header{
    background:var(--nav);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    position:relative;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    margin:0;
    padding:0;
}

nav ul li{
    cursor:pointer;
}

nav ul li:hover{
    color:#007bff;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
}

.hamburger{
    display:none;
    font-size:22px;
    cursor:pointer;
}

.theme-btn{
    margin-left:10px;
    cursor:pointer;
}

@media(max-width:768px){
    nav ul{
        display:none;
        flex-direction:column;
        background:var(--nav);
        position:absolute;
        top:50px;
        right:0;
        width:100%;
        padding:10px;
    }
    nav ul.show{
        display:flex;
    }
    .hamburger{
        display:block;
    }
}
</style>
</head>

<body>

<header>
    <h3>Humair Naseer</h3>
    <div style="display:flex;align-items:center;">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <nav>
            <ul id="navLinks">
                <li>Home</li>
                <li>Profile</li>
                <li>Department</li>
                <li>University</li>
            </ul>
        </nav>
        <div class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</div>
    </div>
</header>

<section class="hero">
    <h1>Humair Naseer</h1>
    <p><strong>Registration No:</strong> 22I-2632</p>
    <p><strong>Department:</strong> Software Engineering</p>
    <p><strong>University:</strong> FAST Islamabad</p>
    <button>View Profile</button>
</section>

<script>
const navLinks=document.getElementById("navLinks");
const themeIcon=document.getElementById("themeIcon");

function toggleMenu(){
    navLinks.classList.toggle("show");
}

function toggleTheme(){
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        themeIcon.textContent="☀️";
    }else{
        localStorage.setItem("theme","light");
        themeIcon.textContent="🌙";
    }
}

window.onload=function(){
    if(localStorage.getItem("theme")==="dark"){
        document.body.classList.add("dark");
        themeIcon.textContent="☀️";
    }
};

window.onresize=function(){
    if(window.innerWidth>768){
        navLinks.classList.remove("show");
    }
};
</script>

</body>
</html>
