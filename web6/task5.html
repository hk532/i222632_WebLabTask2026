<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter App</title>

<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f6f9;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    font-size:40px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.inc{background:rgb(10, 11, 10);color:white;}
.dec{background:rgb(0, 8, 255);color:white;}
.reset{background:gray;color:white;}
</style>
</head>

<body>

<div class="container">
    <h1 id="count">0</h1>
    <button class="inc" onclick="increment()">Increment</button>
    <button class="dec" onclick="decrement()">Decrement</button>
    <button class="reset" onclick="reset()">Reset</button>
</div>

<script>
let count=0;
const display=document.getElementById("count");

function increment(){
    count++;
    display.textContent=count;
}

function decrement(){
    count--;
    display.textContent=count;
}

function reset(){
    count=0;
    display.textContent=count;
}
</script>

</body>
</html>
