<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Real-Time Form Validation</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#eff1f5,#d5d3d7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}
.container{
    background:white;
    padding:18px;
    width:100%;
    max-width:300px;
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}
.form-group{
    margin-bottom:12px;
}
label{
    display:block;
    margin-bottom:4px;
    font-weight:bold;
    font-size:13px;
}
input{
    width:100%;
    padding:6px;
    border-radius:4px;
    border:2px solid #ccc;
    outline:none;
    transition:0.3s;
    font-size:13px;
}
input.valid{
    border-color:green;
}
input.invalid{
    border-color:red;
}
.error{
    font-size:11px;
    color:red;
    height:12px;
    margin-top:2px;
}
button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:4px;
    background:#667eea;
    color:white;
    font-size:14px;
    cursor:pointer;
}
button:disabled{
    background:gray;
    cursor:not-allowed;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{
    -webkit-appearance:none;
    margin:0;
}
input[type=number]{
    -moz-appearance:textfield;
}
</style>
</head>

<body>

<div class="container">
<h2>Registration Form</h2>

<form id="registrationForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>
</div>

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age">
<div class="error" id="ageError"></div>
</div>

<button type="submit" id="submitBtn" disabled>Register</button>
</form>
</div>

<script>
const nameInput=document.getElementById("name");
const emailInput=document.getElementById("email");
const passwordInput=document.getElementById("password");
const confirmPasswordInput=document.getElementById("confirmPassword");
const ageInput=document.getElementById("age");
const submitBtn=document.getElementById("submitBtn");

function setStatus(input,errorElement,message,isValid){
    if(isValid){
        input.classList.add("valid");
        input.classList.remove("invalid");
        errorElement.textContent="";
    }else{
        input.classList.add("invalid");
        input.classList.remove("valid");
        errorElement.textContent=message;
    }
    checkFormValidity();
}

function validateName(){
    const value=nameInput.value.trim();
    setStatus(nameInput,document.getElementById("nameError"),"Name must be at least 3 characters",value.length>=3);
}

function validateEmail(){
    const value=emailInput.value.trim();
    const isValid=value.includes("@")&&value.includes(".");
    setStatus(emailInput,document.getElementById("emailError"),"Email must contain @ and .",isValid);
}

function validatePassword(){
    const value=passwordInput.value;
    const hasNumber=/\d/.test(value);
    const isValid=value.length>=6&&hasNumber;
    setStatus(passwordInput,document.getElementById("passwordError"),"Password must be ≥ 6 characters and contain a number",isValid);
    validateConfirmPassword();
}

function validateConfirmPassword(){
    const isValid=confirmPasswordInput.value===passwordInput.value&&confirmPasswordInput.value!=="";
    setStatus(confirmPasswordInput,document.getElementById("confirmPasswordError"),"Passwords do not match",isValid);
}

function validateAge(){
    const value=parseInt(ageInput.value);
    const isValid=value>=18&&value<=60;
    setStatus(ageInput,document.getElementById("ageError"),"Age must be between 18 and 60",isValid);
}

function checkFormValidity(){
    const allValid=
        nameInput.classList.contains("valid")&&
        emailInput.classList.contains("valid")&&
        passwordInput.classList.contains("valid")&&
        confirmPasswordInput.classList.contains("valid")&&
        ageInput.classList.contains("valid");

    submitBtn.disabled=!allValid;
}

nameInput.addEventListener("input",validateName);
emailInput.addEventListener("input",validateEmail);
passwordInput.addEventListener("input",validatePassword);
confirmPasswordInput.addEventListener("input",validateConfirmPassword);
ageInput.addEventListener("input",validateAge);

document.getElementById("registrationForm").addEventListener("submit",function(e){
    e.preventDefault();
    alert("Registration Successful!");
});
</script>

</body>
</html>
