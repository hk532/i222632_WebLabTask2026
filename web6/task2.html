<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile Card</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:300px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.details{
    display:none;
    margin-top:10px;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#4a90e2;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#357bd8;
}

@media(max-width:400px){
    .card{ width:90%; }
}
</style>
</head>

<body>

<div class="card">

    <h3>HUMAIR NASEER</h3>
    <p>Registration No: 22I-2632</p>
    <p>Department: Software Engineering</p>
    <p>University: FAST Islamabad</p>

    <div class="details" id="moreInfo">
        <p><strong>Hobbies:</strong> Coding, Gaming</p>
        <p><strong>Skills:</strong> HTML, CSS, JavaScript</p>
        <p><strong>Email:</strong> humair@email.com</p>
    </div>

    <button onclick="toggleInfo()" id="toggleBtn">Show More</button>
</div>

<script>
function toggleInfo(){
    const details=document.getElementById("moreInfo");
    const btn=document.getElementById("toggleBtn");

    if(details.style.display==="block"){
        details.style.display="none";
        btn.textContent="Show More";
    }else{
        details.style.display="block";
        btn.textContent="Show Less";
    }
}
</script>

</body>
</html>
